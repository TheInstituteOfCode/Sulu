---
layout: default
---

<section class="flex flex-wrap gap-3 justify-center bg-black px-0">

    {% for card in site.galleryCards %}

        {{card}}
    {% endfor %}

</section>


<script>

    let desiredRem = 16
    let base = document.querySelector('html')
    function adaptGrid(){

        let maxRems = 16
        let minRems = 12

        console.log(base,window,window.innerWidth)
        desiredRem =  window.innerWidth / 90
        if (desiredRem < maxRems) {
            if (desiredRem < minRems) {
                base.style.fontSize = `${minRems}px`
            } else {
                base.style.fontSize = `${desiredRem}px`
            }

        } else {
            base.style.fontSize = `${maxRems}px`
        }

    }

    adaptGrid()

    window.addEventListener('resize',adaptGrid)
</script>
