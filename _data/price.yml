inclusions:
    - 
        name: DONE-FOR-YOU LIGHTING SETUP
        description-html: 
            <p>Choose one of our complimentary lighting styles, and our team will  setup it all up for you to match the mood you’ve picked. </p>
            
    - 
        name: FLASH LIGHTING KIT
        description-html: 
            <p class="mb-0">2x Godox AD600 Flash</p><p class="mb-0">1x Godox AD200 Flash</p><p class="mb-0">Flash trigger for Canon or Sony </p>
            
    - 
        name: DONE-FOR-YOU LIGHTING SETUP
        description-html: 
            <p class="mb-0">3x Colbor CL220 R
            </p>
            <p>
                1x Godox SL300
            </p>
                <p>
                    
                The Colbor CL220 is a continuous lights with very high color accuracy that can be programmed to any RGB color. The Godox SL300 is daylight balanced (5600K). This kit can be used for both photo & video. </p>
                

    - 
        name: LIGHT SHAPING & STANDS
        description-html: 
            <p>A wide range of light modifiers (from big umbrellas and soft boxes to fresnels) to shape the studio lighting. We also have 2x standard V-flat, reflectors and bounce boards, and a full range of grip including C-stands, backdrop stands, butterflies, tripods and sand bags. 
            </p>
            
            <p>See the full list of complimentary light modifiers & grip <a href="#" class="font-bold">here</a>. </p>
    - 
        name: NATURAL LIGHT & CURTAINS
        description-html: 
            <p>All three large windows in the studio have both sheer white curtains and natural linen curtains for privacy and a stunning backdrop.
            </p>
            
            <p>
                You can also request for the curtains to be removed (bare windows) or for blackout curtains to be added at no additional cost. </p>
    - 
        name: HIGH PERFORMANCE AC & FANS
        description-html: 
            <p>We’re pretty sure we have the coldest air-conditioning set of any studio on the island, so whether you’re coming in from the heat or shooting a winter campaign we’ve got you covered. </p>
    - 
        name: FACILITIES
        description-html: 
            <p>We have everything you need for a seamless shoot and a space that’s setup just for you -- we’ll ask your preferences when you book and ensure you have everything you need and nothing you don’t.
            </p>
            
            <p>
                Our faciliaties include up to 6x movable tables to setup products & styling, clothing racks & hangers, full-length mirror, 3x steamers, fast wifi, bluetooth speaker, toilets, hot & cold water dispenser and a styling / changing area. </p>
    - 
        name: FURNITURE & PROPS
        description-html: 
            <p>We have a range of complimentary furniture & props, including antique timber stools, modern studio chairs, large handmade teracotta pots & pot plants. 
            </p>
            <p>
                See the full list of both complimentary props <a href="#" class="font-bold">here</a>. </p>
